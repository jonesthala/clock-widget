<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMI Wetter Widget</title>

<style>
:root {
  --cmi-blue: #009DDB;
  --cmi-dark: #0077A6;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, var(--cmi-blue), var(--cmi-dark));
  color: white;
}

/* Container */
.wrapper {
  padding: 15px;
  text-align: center;
}

/* Wetter Karte (kompakt) */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  border-radius: 16px;
  padding: 15px;
  max-width: 340px;
  margin: 0 auto;
}

.greeting {
  font-size: 20px;
  margin-bottom: 4px;
}

.city {
  font-size: 14px;
  opacity: 0.9;
}

.temp {
  font-size: 40px;
  font-weight: bold;
  margin: 6px 0;
}

.desc {
  font-size: 14px;
}

/* Übergang */
.fade {
  height: 20px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.2), transparent);
  margin-top: -10px;
}

/* GROSSE Illustration */
.illustration {
  width: 100%;
  height: 200px; /* 🔥 viel grösser */
  object-fit: cover;
  object-position: center; /* mittig reinzoomen */
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">
    <div class="greeting" id="greeting">Guten Tag 👋</div>
    <div class="city">Zürich</div>
    <div class="temp">14°C</div>
    <div class="desc">Leicht bewölkt</div>
  </div>

  <div class="fade"></div>

  <!-- grosse Illustration -->
  <img class="illustration" src="cmi-illustration.jpg" alt="CMI Illustration">
</div>

<script>
function updateGreeting() {
  const hour = new Date().getHours();
  let greeting = "Guten Tag 👋";

  if (hour < 12) greeting = "Guten Morgen 👋";
  else if (hour >= 18) greeting = "Guten Abend 👋";

  document.getElementById("greeting").textContent = greeting;
}

updateGreeting();
</script>

</body>
</html>
