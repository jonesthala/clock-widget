<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMI Wetter Widget</title>

<style>
:root {
  --cmi-blue: #009DDB;
  --cmi-dark: #0077A6;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
}

/* GANZER WIDGET */
.wrapper {
  height: 100%;
  min-height: 320px;
  display: flex;
  flex-direction: column;
}

/* OBEN: WETTER */
.top {
  background: linear-gradient(180deg, var(--cmi-blue), var(--cmi-dark));
  padding: 20px;
  text-align: center;
}

/* Wetter Karte */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  border-radius: 16px;
  padding: 15px;
  max-width: 340px;
  margin: 0 auto;
}

.greeting {
  font-size: 20px;
}

.city {
  font-size: 14px;
  opacity: 0.9;
}

.temp {
  font-size: 40px;
  font-weight: bold;
  margin: 6px 0;
}

.desc {
  font-size: 14px;
}

/* UNTEN: GROSSE ILLUSTRATION */
.bottom {
  flex: 1; /* 🔥 nimmt restlichen Platz */
  background-image: url("cmi-illustration.jpg");
  background-size: cover; /* 🔥 füllt alles */
  background-position: center;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="top">
    <div class="card">
      <div class="greeting" id="greeting">Guten Tag 👋</div>
      <div class="city">Zürich</div>
      <div class="temp">14°C</div>
      <div class="desc">Leicht bewölkt</div>
    </div>
  </div>

  <!-- 🔥 HIER ist das grosse Bild -->
  <div class="bottom"></div>

</div>

<script>
function updateGreeting() {
  const hour = new Date().getHours();
  let greeting = "Guten Tag 👋";

  if (hour < 12) greeting = "Guten Morgen 👋";
  else if (hour >= 18) greeting = "Guten Abend 👋";

  document.getElementById("greeting").textContent = greeting;
}

updateGreeting();
</script>

</body>
</html>
